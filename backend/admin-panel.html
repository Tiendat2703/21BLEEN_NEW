<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            margin-top: 10px;
        }
        button:hover {
            background-color: #2980b9;
        }
        .section {
            margin-bottom: 40px;
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 5px;
        }
        .section h2 {
            margin-top: 0;
            color: #2c3e50;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .response {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            background-color: #f8f9fa;
            font-family: monospace;
            white-space: pre-wrap;
            display: none;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .user-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            border-left: 4px solid #3498db;
        }
        .stats-container {
            margin-top: 15px;
            padding: 15px;
            background: #fff;
            border-radius: 5px;
            border: 1px solid #dee2e6;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }
        .stat-box {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
            border-left: 3px solid #3498db;
        }
        .stat-box h4 {
            margin: 0 0 5px 0;
            color: #2c3e50;
            font-size: 14px;
        }
        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
        }
        .toggle-stats {
            background: none;
            border: none;
            color: #3498db;
            cursor: pointer;
            padding: 5px 0;
            text-align: left;
            font-size: 14px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👨‍💼 Admin Panel</h1>
        
        <!-- Admin Login Section -->
        <div class="section">
            <h2>🔑 Đăng nhập Admin</h2>
            <div class="form-group">
                <label for="admin-username">Tên đăng nhập:</label>
                <input type="text" id="admin-username" value="admin">
            </div>
            <div class="form-group">
                <label for="admin-password">Mật khẩu:</label>
                <input type="password" id="admin-password" value="Admin@2024">
            </div>
            <button onclick="adminLogin()">Đăng nhập</button>
            <div id="admin-response" class="response"></div>
        </div>

        <!-- Create User Section -->
        <div class="section">
            <h2>👥 Tạo tài khoản User mới</h2>
            <div class="form-group">
                <label for="user-email">Email:</label>
                <input type="email" id="user-email" placeholder="user@example.com">
            </div>
            <div class="form-group">
                <label for="user-fullname">Họ và tên:</label>
                <input type="text" id="user-fullname" placeholder="Nguyễn Văn A">
            </div>
            <div class="form-group">
                <label for="user-passcode">Passcode (4-6 số):</label>
                <input type="text" id="user-passcode" placeholder="1234">
            </div>
            <button onclick="createUser()" id="create-user-btn" disabled>Tạo tài khoản</button>
            <div id="create-user-response" class="response"></div>
        </div>

        <!-- User List Section -->
        <div class="section">
            <h2>📋 Danh sách User</h2>
            <button onclick="listUsers()" id="list-users-btn">Tải danh sách</button>
            <div id="users-list"></div>
            <div id="user-stats" class="stats-container" style="display: none;">
                <h3>📊 Thống kê chi tiết</h3>
                <div id="stats-content"></div>
            </div>
        </div>
    </div>

    <script>
        // Biến toàn cục
        let adminToken = '';
        const API_BASE_URL = 'http://localhost:3001';

        // Bắt sự kiện khi trang tải xong
        document.addEventListener('DOMContentLoaded', function() {
            // Kiểm tra xem có token trong localStorage không
            const savedToken = localStorage.getItem('adminToken');
            if (savedToken) {
                adminToken = savedToken;
                document.getElementById('create-user-btn').disabled = false;
                document.getElementById('admin-response').textContent = 'Đã đăng nhập từ trước';
                document.getElementById('admin-response').className = 'response success';
                document.getElementById('admin-response').style.display = 'block';
            }
        });

        // Hàm đăng nhập admin
        async function adminLogin() {
            const username = document.getElementById('admin-username').value;
            const password = document.getElementById('admin-password').value;
            const responseDiv = document.getElementById('admin-response');
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/admin/login/simple`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success && data.data && data.data.token) {
                    adminToken = data.data.token;
                    localStorage.setItem('adminToken', adminToken);
                    document.getElementById('create-user-btn').disabled = false;
                    
                    responseDiv.textContent = '✅ Đăng nhập thành công!';
                    responseDiv.className = 'response success';
                } else {
                    responseDiv.textContent = '❌ ' + (data.message || 'Đăng nhập thất bại');
                    responseDiv.className = 'response error';
                }
            } catch (error) {
                responseDiv.textContent = '❌ Lỗi: ' + error.message;
                responseDiv.className = 'response error';
            }
            responseDiv.style.display = 'block';
        }

        // Hàm tạo user mới
        async function createUser() {
            const email = document.getElementById('user-email').value;
            const fullName = document.getElementById('user-fullname').value;
            const passcode = document.getElementById('user-passcode').value;
            const responseDiv = document.getElementById('create-user-response');
            
            // Validate input
            if (!email || !fullName || !passcode) {
                responseDiv.textContent = '❌ Vui lòng điền đầy đủ thông tin';
                responseDiv.className = 'response error';
                responseDiv.style.display = 'block';
                return;
            }
            
            if (!adminToken) {
                responseDiv.textContent = '❌ Vui lòng đăng nhập trước';
                responseDiv.className = 'response error';
                responseDiv.style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${adminToken}`
                    },
                    body: JSON.stringify({
                        email,
                        full_name: fullName,
                        passcode
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Hiển thị thông tin user đã tạo
                    const userInfo = `
                        ✅ Tạo tài khoản thành công!
                        
                        Thông tin tài khoản:
                        - User ID: ${data.data.userId}
                        - Email: ${email}
                        - Họ tên: ${fullName}
                        - Passcode: ${passcode}
                        
                        Lưu ý: Hãy ghi nhớ User ID và Passcode để đăng nhập sau này.
                    `;
                    
                    responseDiv.textContent = userInfo;
                    responseDiv.className = 'response success';
                    
                    // Clear form
                    document.getElementById('user-email').value = '';
                    document.getElementById('user-fullname').value = '';
                    document.getElementById('user-passcode').value = '';
                    
                    // Cập nhật danh sách user
                    listUsers();
                } else {
                    responseDiv.textContent = '❌ Lỗi: ' + (data.message || 'Không thể tạo tài khoản');
                    responseDiv.className = 'response error';
                }
            } catch (error) {
                responseDiv.textContent = '❌ Lỗi: ' + error.message;
                responseDiv.className = 'response error';
            }
            responseDiv.style.display = 'block';
        }

        // Hàm lấy danh sách user
        async function listUsers() {
            const usersListDiv = document.getElementById('users-list');
            usersListDiv.innerHTML = '<p>Đang tải danh sách người dùng...</p>';
            
            try {
                // Lấy danh sách tất cả người dùng
                const response = await fetch(`${API_BASE_URL}/api/users/all`, {
                    headers: {
                        'Authorization': `Bearer ${adminToken}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    const error = await response.json().catch(() => ({}));
                    throw new Error(error.message || 'Không thể tải danh sách người dùng');
                }
                
                const data = await response.json();
                
                if (data.success && data.data && data.data.length > 0) {
                    let html = '<h3>Danh sách người dùng:</h3>';
                    
                    // Hiển thị danh sách user
                    const users = data.data;
                    
                    if (users.length > 0) {
                        users.forEach(user => {
                            html += `
                                <div class="user-card">
                                    <strong>User ID:</strong> ${user.user_id}<br>
                                    <strong>Email:</strong> ${user.email || 'Chưa có email'}<br>
                                    <strong>Ngày tạo:</strong> ${new Date().toLocaleString()}
                                </div>
                            `;
                        });
                    } else {
                        html += '<p>Không tìm thấy người dùng nào.</p>';
                    }
                    
                    usersListDiv.innerHTML = html;
                } else {
                    usersListDiv.innerHTML = '<p>Không có dữ liệu người dùng nào.</p>';
                }
            } catch (error) {
                console.error('Error listing users:', error);
                usersListDiv.innerHTML = `
                    <div class="error">
                        <p><strong>Lỗi khi tải danh sách người dùng:</strong></p>
                        <p>${error.message || 'Không thể kết nối đến máy chủ'}</p>
                        <p>Vui lòng kiểm tra lại kết nối hoặc làm mới trang và thử lại.</p>
                        <p><small>${error.stack || ''}</small></p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
