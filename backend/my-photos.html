<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ảnh của tôi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            margin-top: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .gallery-item {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }
        .gallery-item .info {
            padding: 10px;
            background: white;
        }
        .gallery-item .position {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 12px;
        }
        .gallery-item .actions {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
        }
        .btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            text-decoration: none;
            text-align: center;
            flex: 1;
            margin: 0 2px;
        }
        .btn-danger {
            background-color: #e74c3c;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .loading {
            text-align: center;
            padding: 20px;
            font-size: 18px;
            color: #666;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }
        .empty-state i {
            font-size: 50px;
            color: #ddd;
            margin-bottom: 20px;
        }
        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid transparent;
            border-radius: 4px;
            display: none;
        }
        .alert-error {
            background-color: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📷 Ảnh của tôi</h1>
            <div>
                <a href="/upload.html" class="btn">Tải ảnh lên</a>
                <a href="/" id="back-to-profile" class="btn">Về trang cá nhân</a>
            </div>
        </div>
        
        <div id="auth-error" class="alert alert-error" style="display: none;">
            Bạn chưa đăng nhập hoặc phiên đã hết hạn. Vui lòng <a href="/user-login.html">đăng nhập lại</a>.
        </div>
        
        <div id="gallery-container">
            <div id="loading" class="loading">Đang tải ảnh...</div>
            <div id="empty-state" class="empty-state" style="display: none;">
                <div>📷</div>
                <h3>Chưa có ảnh nào</h3>
                <p>Hãy tải lên ảnh đầu tiên của bạn!</p>
                <a href="/upload.html" class="btn" style="display: inline-block; width: auto; margin-top: 15px;">Tải ảnh lên ngay</a>
            </div>
            <div id="gallery" class="gallery">
                <!-- Photos will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('userToken');
            const userId = localStorage.getItem('userId');
            
            if (!token || !userId) {
                document.getElementById('auth-error').style.display = 'block';
                document.getElementById('gallery-container').style.display = 'none';
                return;
            }
            
            // Set back button URL
            document.getElementById('back-to-profile').href = `/${userId}`;
            
            // Load user photos
            await loadUserPhotos(userId, token);
        });
        
        async function loadUserPhotos(userId, token) {
            const gallery = document.getElementById('gallery');
            const loading = document.getElementById('loading');
            const emptyState = document.getElementById('empty-state');
            
            try {
                const response = await fetch(`http://localhost:3001/api/images/${userId}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (!response.ok) {
                    throw new Error('Không thể tải ảnh');
                }
                
                const result = await response.json();
                
                // Hide loading
                loading.style.display = 'none';
                
                if (result.data && result.data.length > 0) {
                    // Sort images by position (null positions last)
                    const sortedImages = [...result.data].sort((a, b) => {
                        if (a.position === null) return 1;
                        if (b.position === null) return -1;
                        return a.position - b.position;
                    });
                    
                    // Display images
                    gallery.innerHTML = sortedImages.map(image => `
                        <div class="gallery-item" data-id="${image.id}">
                            <img src="${image.url}" alt="Ảnh">
                            ${image.position !== null ? `<span class="position">Vị trí: ${image.position}</span>` : ''}
                            <div class="info">
                                <div class="actions">
                                    <a href="${image.url}" target="_blank" class="btn">Xem</a>
                                    <button class="btn btn-danger" onclick="deleteImage('${image.id}')">Xóa</button>
                                </div>
                            </div>
                        </div>
                    `).join('');
                    
                    // Show gallery
                    gallery.style.display = 'grid';
                    emptyState.style.display = 'none';
                } else {
                    // No images
                    gallery.style.display = 'none';
                    emptyState.style.display = 'block';
                }
            } catch (error) {
                console.error('Error loading photos:', error);
                loading.textContent = 'Có lỗi xảy ra khi tải ảnh. Vui lòng thử lại.';
                gallery.style.display = 'none';
                emptyState.style.display = 'none';
            }
        }
        
        // Make deleteImage function available globally
        window.deleteImage = async (imageId) => {
            if (!confirm('Bạn có chắc chắn muốn xóa ảnh này?')) {
                return;
            }
            
            const token = localStorage.getItem('userToken');
            
            try {
                const response = await fetch(`http://localhost:3001/api/images/${imageId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // Remove image from DOM
                    const imageElement = document.querySelector(`.gallery-item[data-id="${imageId}"]`);
                    if (imageElement) {
                        imageElement.remove();
                    }
                    
                    // Check if no images left
                    if (document.querySelectorAll('.gallery-item').length === 0) {
                        document.getElementById('gallery').style.display = 'none';
                        document.getElementById('empty-state').style.display = 'block';
                    }
                    
                    alert('Đã xóa ảnh thành công');
                } else {
                    throw new Error(result.message || 'Không thể xóa ảnh');
                }
            } catch (error) {
                console.error('Delete error:', error);
                alert('Có lỗi xảy ra khi xóa ảnh: ' + error.message);
            }
        };
    </script>
</body>
</html>
